spring:
  datasource:
    url: jdbc:h2:mem:deepaudit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration/common

deepaudit:
  storage-root: ./target/test-data
  git:
    allow-local-repositories: true
    allowed-hosts: localhost
  ai:
    required: true
  embedding:
    provider: local
    dimensions: 128
  vector-store:
    provider: memory
