spring:
  datasource:
    url: jdbc:h2:mem:model-api-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false

deepaudit:
  storage-root: ./target/model-api-test-data
  ai:
    required: true
    # 通过环境变量提供真实模型凭据，然后直接在 IDEA 中运行 ModelApiManualIT。
    base-url: https://api.deepseek.com
    api-key: ${DEEPAUDIT_MODEL_TEST_AI_API_KEY:}
    model: deepseek-v4-flash
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
  embedding:
    provider: remote
    # Embedding 凭据通过独立环境变量注入，避免测试配置提交真实密钥。
    base-url: https://api.siliconflow.cn/v1
    api-key: ${DEEPAUDIT_MODEL_TEST_EMBEDDING_API_KEY:}
    model: BAAI/bge-m3
