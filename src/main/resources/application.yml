server:
  port: ${DEEPAUDIT_SERVER_PORT:8080}

spring:
  application:
    name: deepaudit-java
  config:
    # 将项目根目录的 .env 作为 Properties 文件加载；文件不存在时仍允许启动。
    import: optional:file:./.env[.properties]
  jackson:
    mapper:
      # LLM 常返回 critical、High 等不同大小写；未知枚举仍保持严格失败。
      accept-case-insensitive-enums: true
  datasource:
    # 数据库连接通过环境变量注入，本地默认连接 localhost 且不提供默认密码。
    url: ${DEEPAUDIT_DATASOURCE_URL:jdbc:postgresql://localhost:5432/deepaudit}
    username: ${DEEPAUDIT_DATASOURCE_USERNAME:deepaudit}
    password: ${DEEPAUDIT_DATASOURCE_PASSWORD:}
    driver-class-name: ${DEEPAUDIT_DATASOURCE_DRIVER:org.postgresql.Driver}
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/postgresql
    placeholders:
      embeddingDimensions: ${DEEPAUDIT_EMBEDDING_DIMENSIONS:1024}

deepaudit:
  storage-root: ${DEEPAUDIT_STORAGE_ROOT:./data}
  git:
    allowed-hosts: ${DEEPAUDIT_GIT_ALLOWED_HOSTS:github.com,gitlab.com,gitee.com}
    allow-local-repositories: ${DEEPAUDIT_GIT_ALLOW_LOCAL_REPOSITORIES:false}
    transport-timeout-seconds: ${DEEPAUDIT_GIT_TIMEOUT_SECONDS:60}
    max-commits: ${DEEPAUDIT_GIT_MAX_COMMITS:200}
    max-files-per-snapshot: ${DEEPAUDIT_GIT_MAX_FILES:100000}
    max-file-bytes: ${DEEPAUDIT_GIT_MAX_FILE_BYTES:10485760}
    max-snapshot-bytes: ${DEEPAUDIT_GIT_MAX_SNAPSHOT_BYTES:536870912}
  ai:
    required: true
    base-url: ${DEEPAUDIT_AI_BASE_URL:https://api.deepseek.com}
    api-key: ${DEEPAUDIT_AI_API_KEY:}
    model: ${DEEPAUDIT_AI_MODEL:deepseek-v4-flash}
    connect-timeout-seconds: 10
    read-timeout-seconds: 120
    # 模型偶尔会返回语法不合法的 JSON；最多追加两次格式纠正请求。
    json-repair-attempts: 2
    max-iterations-per-agent: 6
    max-tool-calls-per-agent: 10
    # 同一项目内并行执行专业 Agent；Recon、Orchestrator、Critic 和 Report 仍按阶段顺序执行。
    professional-agent-parallelism: 4
    planner-batch-size: 12
    max-audit-targets: 300
  embedding:
    provider: ${DEEPAUDIT_EMBEDDING_PROVIDER:remote}
    base-url: ${DEEPAUDIT_EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
    api-key: ${DEEPAUDIT_EMBEDDING_API_KEY:}
    model: ${DEEPAUDIT_EMBEDDING_MODEL:BAAI/bge-m3}
    dimensions: ${DEEPAUDIT_EMBEDDING_DIMENSIONS:1024}
  vector-store:
    provider: ${DEEPAUDIT_VECTOR_STORE_PROVIDER:pgvector}
    hnsw-ef-search: ${DEEPAUDIT_VECTOR_HNSW_EF_SEARCH:100}
  semantic:
    enabled: true
    max-call-depth: 10
    max-paths-per-entry: 20
    max-states-per-entry: 1000

mybatis:
  mapper-locations: classpath*:mappers/*.xml
  type-aliases-package: com.deepaudit.domain
  type-handlers-package: com.deepaudit.mybatis
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

logging:
  level:
    com.deepaudit: INFO
